<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legendwolf_official</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 30%, #1a0505 0%, #0a0a0a 70%);
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, #ff4500, transparent, #ff0000, transparent, #ff4500, transparent);
      animation: rotateGlow 20s linear infinite;
      opacity: 0.08;
      pointer-events: none;
    }

    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .hero::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(255,69,0,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .title {
      position: relative;
      z-index: 2;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-align: center;
      background: linear-gradient(135deg, #ff0000, #ff4500, #ff8c00, #ff4500, #ff0000);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease-in-out infinite;
      filter: drop-shadow(0 0 60px rgba(255,69,0,0.3));
      line-height: 1.1;
      padding: 0 1rem;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .subtitle {
      position: relative;
      z-index: 2;
      font-size: clamp(0.9rem, 2vw, 1.3rem);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 1.5rem;
      text-align: center;
    }

    .accent-line {
      position: relative;
      z-index: 2;
      width: clamp(100px, 20vw, 300px);
      height: 3px;
      margin-top: 2rem;
      background: linear-gradient(90deg, transparent, #ff4500, #ff0000, transparent);
      border-radius: 2px;
    }

    .glow-dots {
      position: absolute;
      z-index: 1;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .glow-dot {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      animation: floatDot 8s ease-in-out infinite;
    }

    .glow-dot:nth-child(1) {
      width: 400px;
      height: 400px;
      background: #ff0000;
      top: 10%;
      left: -10%;
      animation-delay: 0s;
    }

    .glow-dot:nth-child(2) {
      width: 300px;
      height: 300px;
      background: #ff4500;
      bottom: 15%;
      right: -5%;
      animation-delay: 2s;
    }

    .glow-dot:nth-child(3) {
      width: 250px;
      height: 250px;
      background: #ff8c00;
      top: 50%;
      left: 40%;
      animation-delay: 4s;
    }

    @keyframes floatDot {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    .particles {
      position: absolute;
      z-index: 1;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #ff4500;
      border-radius: 50%;
      opacity: 0.6;
      animation: particleFloat 10s linear infinite;
    }

    @keyframes particleFloat {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .footer {
      position: relative;
      z-index: 2;
      padding: 2rem;
      text-align: center;
      color: rgba(255,255,255,0.2);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="glow-dots">
      <div class="glow-dot"></div>
      <div class="glow-dot"></div>
      <div class="glow-dot"></div>
    </div>
    <div class="particles" id="particles"></div>
    <h1 class="title">Legendwolf_official</h1>
    <p class="subtitle">⚡ Coming Soon ⚡</p>
    <div class="accent-line"></div>
    <div class="footer">Legendwolf_official &mdash; 2025</div>
  </section>

  <script>
    const container = document.getElementById('particles');
    for (let i = 0; i < 50; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 10 + 's';
      p.style.animationDuration = (8 + Math.random() * 8) + 's';
      p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
      p.style.background = ['#ff0000', '#ff4500', '#ff8c00'][Math.floor(Math.random() * 3)];
      container.appendChild(p);
    }
  </script>
</body>
</html>
